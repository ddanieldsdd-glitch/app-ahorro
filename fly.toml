# Configuración para Fly.io
# Documentación: https://fly.io/docs/reference/configuration/
#
# Despliegue inicial:
#   fly launch --name app-ahorro --region mad --no-deploy
#   fly secrets set SYNC_KEY=tu_clave_secreta
#   fly volumes create app_ahorro_data --region mad --size 1
#   fly deploy
#
# Actualizar:
#   fly deploy

app = "app-ahorro"   # Cambia esto a un nombre único tuyo
primary_region = "mad"  # Madrid — o la región más cercana a ti

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  # CORS_ORIGIN = "https://app-ahorro.fly.dev"  # descomentar cuando tengas la URL final

[mounts]
  source = "app_ahorro_data"
  destination = "/app/data"

[[services]]
  internal_port = 3000
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    path = "/api/health"
    method = "get"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
