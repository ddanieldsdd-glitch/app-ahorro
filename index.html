  <meta name="app-cache-version" content="presupuesto-v57">
  <script>window.__APP_BUILD_VERSION='presupuesto-v57';</script>
  <!-- Comprobación temprana de versión (Safari/iOS/macOS cachean con fuerza — XHR + número de build) -->
  <script>
    (function () {
      var running = window.__APP_BUILD_VERSION;
      if (!running) return;
      var ua = navigator.userAgent || '';
      var isApple = /iPhone|iPad|iPod|Macintosh|Mac OS X/i.test(ua) && !/Chrome|Chromium|Edg|Firefox/i.test(ua)
        || /iPhone|iPad|iPod/i.test(ua);
      function parseBuild(v) {
        var m = String(v || '').match(/v(\d+)/i);
        return m ? parseInt(m[1], 10) : 0;
      }
      function isNewer(remote, local) {
        if (!remote || !local) return remote && remote !== local;
        var dr = parseBuild(remote), lr = parseBuild(local);
        if (dr && lr) return dr > lr;
        return remote !== local;
      }
      function applyRemote(remote) {
        remote = String(remote || '').trim().split(/\s+/)[0];
        if (remote && isNewer(remote, running)) window.__PENDING_APP_VERSION = remote;
      }
      function xhrGet(url, cb) {
        try {
          var x = new XMLHttpRequest();
          x.open('GET', url, true);
          x.setRequestHeader('Cache-Control', 'no-cache, no-store, must-revalidate');
          x.setRequestHeader('Pragma', 'no-cache');
          x.setRequestHeader('X-App-Update-Check', '1');
          x.onload = function () { cb(x.status >= 200 && x.status < 300 ? x.responseText : ''); };
          x.onerror = function () { cb(''); };
          x.send();
        } catch (e) { cb(''); }
      }
      function fetchGet(url, cb) {
        var opts = { cache: 'no-store', credentials: 'same-origin', headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache', 'X-App-Update-Check': '1' } };
        fetch(url, opts).then(function (r) { return r.ok ? r.text() : ''; }).then(cb).catch(function () { cb(''); });
      }
      function get(url, cb) { (isApple ? xhrGet : fetchGet)(url, cb); }
      var bust = Date.now() + '-' + Math.random().toString(36).slice(2, 8);
      var pending = 5, best = null;
      function doneOne(raw) {
        if (raw) {
          var v = raw.trim().split(/\s+/)[0];
          try { var j = JSON.parse(raw); if (j && j.cache) v = j.cache; } catch (e) {}
          var meta = raw.match(/name="app-cache-version"\s+content="([^"]+)"/i);
          if (meta && meta[1]) v = meta[1];
          var inline = raw.match(/__APP_BUILD_VERSION\s*=\s*['"]([^'"]+)['"]/);
          if (inline && inline[1]) v = inline[1];
          if (v && (!best || parseBuild(v) > parseBuild(best))) best = v;
        }
        if (--pending === 0 && best) applyRemote(best);
      }
      get('/build-id.txt?_=' + bust, doneOne);
      get('/api/version?_=' + bust, doneOne);
      get('/version-check.json?_=' + bust, doneOne);
      get('/version.json?_=' + bust, doneOne);
      get('/index.html?_=' + bust, doneOne);
      // Segundo reload tras limpieza de caché (WebKit PWA a veces necesita dos pasadas)
      try {
        var params = new URLSearchParams(window.location.search);
        if (params.get('hard') === '1' && isApple && !sessionStorage.getItem('_appHardReloadDone')) {
          sessionStorage.setItem('_appHardReloadDone', '1');
          setTimeout(function () { window.location.replace(window.location.pathname + '?_=' + Date.now()); }, 400);
        } else if (!params.get('hard')) {
          sessionStorage.removeItem('_appHardReloadDone');
        }
      } catch (e) { /* ignore */ }
    })();
  </script>

  <!-- Anti-flash: apply stored theme before first paint -->
  <script>
    (function() {
      var t = localStorage.getItem('appTheme');
      if (t === 'dark') {
        document.documentElement.setAttribute('data-theme','dark');
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute('content','#0F172A');
      } else if (t === 'light') {
        document.documentElement.setAttribute('data-theme','light');
      }
    })();
  </script>
