<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4F46E5">
  <meta name="app-cache-version" content="presupuesto-v27">
  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Presupuesto">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>Presupuesto</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Anti-flash: apply stored theme before first paint -->
  <script>
    (function() {
      var t = localStorage.getItem('appTheme');
      if (t === 'dark') {
        document.documentElement.setAttribute('data-theme','dark');
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute('content','#0F172A');
      } else if (t === 'light') {
        document.documentElement.setAttribute('data-theme','light');
      }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- Vercel Web Analytics (enable in Dashboard → Analytics first) -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="header-top">
      <div class="app-title">💰 Presupuesto</div>
      <div class="header-controls">
        <span id="syncStatusBadge" class="sync-status-badge sync-pending" title="Estado de sincronización">…</span>
        <select id="monthSelector"></select>
        <button id="archiveBtn" class="btn-secondary" title="Archivar mes">📦<span class="header-btn-label"> Archivar</span></button>
        <button class="btn-secondary" onclick="App._exportData()" title="Descargar backup">⬇</button>
        <button class="btn-secondary" onclick="document.getElementById('restoreInput').click()" title="Restaurar backup">⬆</button>
        <input type="file" id="restoreInput" accept=".json" style="display:none">
      </div>
    </div>
  </header>

  <div class="container">
    <div class="tabs" id="mainTabs">
      <button class="tab-btn active" data-tab="dashboard" title="Inicio"><span class="tab-icon" aria-hidden="true">🏠</span><span class="tab-label">Inicio</span></button>
      <button class="tab-btn" data-tab="registro" title="Movimientos"><span class="tab-icon" aria-hidden="true">📝</span><span class="tab-label">Movimientos</span></button>
      <button class="tab-btn" data-tab="calendario" title="Calendario"><span class="tab-icon" aria-hidden="true">📆</span><span class="tab-label">Calendario</span></button>
      <button class="tab-btn" data-tab="presupuesto" title="Ahorro"><span class="tab-icon" aria-hidden="true">💡</span><span class="tab-label">Ahorro</span></button>
      <button class="tab-btn" data-tab="deudas" title="Deudas"><span class="tab-icon" aria-hidden="true">💸</span><span class="tab-label">Deudas</span></button>
      <button class="tab-btn" data-tab="graficos" title="Gráficos"><span class="tab-icon" aria-hidden="true">📊</span><span class="tab-label">Gráficos</span></button>
      <button class="tab-btn" data-tab="categorias" title="Configuración"><span class="tab-icon" aria-hidden="true">⚙️</span><span class="tab-label">Ajustes</span></button>
    </div>

    <div id="tab-dashboard" class="tab-content active"></div>
    <div id="tab-registro" class="tab-content"></div>
    <div id="tab-calendario" class="tab-content"></div>
    <div id="tab-presupuesto" class="tab-content"></div>
    <div id="tab-deudas" class="tab-content"></div>
    <div id="tab-graficos" class="tab-content"></div>
    <div id="tab-categorias" class="tab-content"></div>
  </div>

  <!-- PIN lock screen -->
  <div id="pinScreen" style="display:none;position:fixed;inset:0;z-index:1000;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;gap:18px">
    <div style="font-size:48px">🔒</div>
    <div style="font-size:20px;font-weight:700;color:var(--text)">Introduce tu PIN</div>
    <input id="pinInput" type="password" inputmode="numeric" maxlength="4"
      style="width:140px;text-align:center;font-size:32px;letter-spacing:12px;padding:10px;border:2px solid var(--border);border-radius:12px;background:var(--card)"
      placeholder="····">
    <button onclick="App._checkPin()" class="btn btn-primary" style="width:140px">Entrar</button>
    <div id="pinError" style="color:var(--expense);font-size:13px;min-height:18px"></div>
  </div>

  <!-- Mobile bottom navigation -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="bottom-nav-btn active" data-tab="dashboard" title="Inicio"><span class="nav-icon" aria-hidden="true">🏠</span><span class="nav-label">Inicio</span></button>
    <button class="bottom-nav-btn" data-tab="registro" title="Movimientos"><span class="nav-icon" aria-hidden="true">📝</span><span class="nav-label">Mov.</span></button>
    <button class="bottom-nav-btn" data-tab="calendario" title="Calendario"><span class="nav-icon" aria-hidden="true">📆</span><span class="nav-label">Cal.</span></button>
    <button class="bottom-nav-btn" data-tab="presupuesto" title="Ahorro"><span class="nav-icon" aria-hidden="true">💡</span><span class="nav-label">Ahorro</span></button>
    <button class="bottom-nav-btn" data-tab="deudas" title="Deudas"><span class="nav-icon" aria-hidden="true">💸</span><span class="nav-label">Deudas</span></button>
    <button class="bottom-nav-btn" data-tab="graficos" title="Gráficos"><span class="nav-icon" aria-hidden="true">📊</span><span class="nav-label">Gráf.</span></button>
    <button class="bottom-nav-btn" data-tab="categorias" title="Configuración"><span class="nav-icon" aria-hidden="true">⚙️</span><span class="nav-label">Ajustes</span></button>
  </nav>

  <button class="fab" id="quickAddBtn" title="Añadir gasto rápido">+</button>

  <div class="quick-backdrop" id="quickBackdrop"></div>
  <div class="quick-overlay" id="quickOverlay">
    <div class="handle"></div>
    <div id="quickForm"></div>
  </div>

    <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle"></div>
      <div id="modalBody"></div>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>

  <script src="js/crypto-e2e.js"></script>
  <script src="js/store.js"></script>
  <script src="js/emoji-utils.js"></script>
  <script src="js/budget-engine.js"></script>
  <script src="js/install.js"></script>
  <script src="js/movement-form.js"></script>
  <script src="js/presupuesto.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/registro.js"></script>
  <script src="js/calendario.js"></script>
  <script src="js/deudas.js"></script>
  <script src="js/graficos.js"></script>
  <script src="js/categorias.js"></script>
  <script src="js/backup-io.js"></script>
  <script src="js/excel-io.js"></script>
  <script src="js/tutorial.js"></script>
  <script src="js/vercel-analytics.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then((reg) => {
        reg.addEventListener('updatefound', () => {
          const worker = reg.installing;
          worker?.addEventListener('statechange', () => {
            if (worker.state === 'installed' && navigator.serviceWorker.controller) {
              if (typeof App !== 'undefined') App.showToast('🔄 Nueva versión disponible — recarga la app', 5000);
            }
          });
        });
      });
    }
  </script>
</body>
</html>
